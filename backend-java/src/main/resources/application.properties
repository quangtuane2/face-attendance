server.port=8080
spring.application.name=attendance-backend

# Database 
spring.datasource.url=jdbc:mysql://localhost:3306/face_attendance?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=attendance_jwt_secret_key_must_be_at_least_32_characters_long_2024
app.jwt.expiration-ms=86400000

# Python AI Service 
ai.service.url=http://localhost:8000

#  File Upload 
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=uploads/snapshots

# Logging 
logging.level.com.example.attendance=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.cors=DEBUG
